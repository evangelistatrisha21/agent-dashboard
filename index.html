<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
        }

        .link-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, border 0.2s;
            border: 1px solid transparent;
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .info h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .info p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .btn {
            background: var(--accent);
            color: #0f172a;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎰 My Casino Links</h1>

        <a href="https://casino-link-1.com" target="_blank" class="link-card">
            <div class="info">
                <h3>Casino Name One</h3>
                <p>Username: Player777</p>
            </div>
            <div class="btn">Open</div>
        </a>

        <a href="https://casino-link-2.com" target="_blank" class="link-card">
            <div class="info">
                <h3>Casino Name Two</h3>
                <p>Username: HighRoller_X</p>
            </div>
            <div class="btn">Open</div>
        </a>

        </div>

</body>
</html>
